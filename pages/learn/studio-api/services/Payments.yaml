  - name: ClosePurchasePrompt
    summary: |
      Closes the purchase prompt if one is currently open on the local client. Has no effect otherwise.
      
      Must be called with colon syntax (Payments:ClosePurchasePrompt) — calling it with a dot will raise
      "'self' cannot be null".
    description:
    is_static: false
    code_samples: |
      ```lua
      Payments:ClosePurchasePrompt()
      ```
    tags:
      - ClientOnly
    parameters:
    returns:
      - type: void
        summary:
  - name: GetProduct
    summary: |
      Retrieves a product by its ID.
      Use this to get product details like name, description, and price.
      
      TESTING: Use "goldfish" or "eel" as test product IDs in Studio before your world is uploaded.
      Once uploaded with IWP configured in Creator Portal, use your actual product IDs.
    description:
    is_static: false
    code_samples: |
      ```lua
      -- Test in Studio with built-in test products
      Payments.GetProduct("goldfish", function(product, error)
          if error == PaymentsError.None and product ~= nil then
              print("Product: " .. product.name)
              print("Price: " .. product.price .. " Gold")
              print("Description: " .. product.description)
          end
      end)
      
      -- Use actual product IDs once world is uploaded
      Payments.GetProduct("premium_bundle", function(product, error)
          if error == PaymentsError.None and product ~= nil then
              print("Product: " .. product.name)
          end
      end)
      ```
    tags:
      - ServerOnly
    parameters:
      - name: productId
        type: string
        tags:
        default:
        summary:
      - name: callback
        type: "(product: WorldProduct, error: PaymentsError) -> ()"
        tags:
        default:
        summary:
    returns:
      - type: void
        summary:
  - name: GetProducts
    summary: |
      Retrieves a list of all available In-World Purchase products.
      
      TESTING: In Studio, this returns test products "goldfish" and "eel" before your world is uploaded.
      Once uploaded with IWP configured, this returns your actual configured products.
      
      Pagination: limit caps how many products are returned in a single page.
      Pass nil for cursorId to get the first page. Use the returned nextCursorId to fetch the next page.
      If returned nextCursorId is nil, no more results exist.
    description:
    is_static: false
    code_samples: |
      ```lua
      -- Get the first page of products (includes test products in Studio)
      Payments.GetProducts(25, nil, function(products, nextCursorId, error)
          if error == PaymentsError.None then
              print("Available products:")
              for i, product in ipairs(products) do
                  print("- " .. product.name .. ": " .. product.price .. " Gold")
              end
          end
      end)
      ```
    tags:
      - ServerOnly
    parameters:
      - name: limit
        type: number
        tags:
        default:
        summary:
      - name: cursorId
        type: string
        tags:
        default:
        summary:
      - name: callback
        type: "(products: {WorldProduct}, nextCursorId: string, error: PaymentsError) -> ()"
        tags:
        default:
        summary:
    returns:
      - type: void
        summary:
  - name: GetPurchases
    summary: |
      Retrieves a list of purchases made by a player for a specific product.
      
      Pagination: Pass nil for cursorId to get first results. Use returned nextCursorId for next page.
      If returned nextCursorId is nil, no more results exist.
    description:
    is_static: false
    code_samples: |
      ```lua
      Payments.GetPurchases(player, "premium_bundle", 10, nil, function(purchases, nextCursorId, error)
          if error == PaymentsError.None then
              print("Found " .. #purchases .. " purchases")
              for i, purchase in ipairs(purchases) do
                  print("Purchase ID: " .. purchase.id .. " on " .. os.date("%Y-%m-%d", purchase.purchase_date))
              end
          end
      end)
      ```
    tags:
      - ServerOnly
    parameters:
      - name: player
        type: Class.Player
        tags:
        default:
        summary:
      - name: productId
        type: string
        tags:
        default:
        summary:
      - name: limit
        type: number
        tags:
        default:
        summary:
      - name: cursorId
        type: string
        tags:
        default:
        summary:
      - name: callback
        type: "(purchases: {WorldProductPurchase}, nextCursorId: string, error: PaymentsError) -> ()"
        tags:
        default:
        summary:
    returns:
      - type: void
        summary:
  - name: PromptPurchase
    summary: |
      Opens the purchase prompt on the local client so the player can buy the given product.
      The callback receives true if the player pressed the purchase button, false if they cancelled it.
      Receiving true does not mean the purchase was completed; the PurchaseHandler must call AcknowledgePurchase.
      Process the purchase there on the server, not here on the client.
      
      Must be called with colon syntax (Payments:PromptPurchase) — calling it with a dot will raise
      "'self' cannot be null".
      
      TESTING: Use "goldfish" or "eel" as test product IDs in Studio before your world is uploaded.
    description:
    is_static: false
    code_samples: |
      ```lua
      Payments:PromptPurchase("goldfish", function(success)
          if success then
              print("Player completed the purchase")
          else
              print("Player cancelled or the purchase failed")
          end
      end)
      ```
    tags:
      - ClientOnly
    parameters:
      - name: productId
        type: string
        tags:
        default:
        summary:
      - name: callback
        type: "(obj: boolean) -> ()"
        tags:
        default:
        summary:
    returns:
      - type: void
        summary:
