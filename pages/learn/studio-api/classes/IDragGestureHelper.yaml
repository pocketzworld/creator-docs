methods:
  - name: CanStartTrackingGesture
    summary: |
      Return true to allow the gesture to start tracking the pointer at the given position,
      or false to continue waiting (typically until the minimum drag distance is reached).
    description:
    is_static: false
    code_samples:
    tags:
      - ClientOnly
    parameters:
      - name: gesture
        type: Class.DragGesture
        tags:
        default:
        summary: |
          The drag gesture being evaluated.
      - name: position
        type: DataType.Vector2
        tags:
        default:
        summary: |
          The current pointer position, in the gesture's coordinate space.
    returns:
      - type: boolean
        summary:
