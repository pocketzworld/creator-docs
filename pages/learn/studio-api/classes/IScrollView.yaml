    is_static: false
    code_samples:
    tags:
      - ClientOnly
    type: "() -> (boolean)"
  - name: isReversed
    summary: |
      When true, the first item is laid out at the end and subsequent items are laid out before it.
      For horizontal layouts, the effective direction also depends on RightToLeft.IsEnabled.
    description:
    is_static: false
    code_samples:
    tags:
      - ClientOnly
    type: boolean
  - name: isScrollOffsetLocked
    summary: |
      When true, assignments to  are ignored, effectively freezing the scroll position.
