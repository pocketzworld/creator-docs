    is_static: false
    code_samples:
    tags:
      - ClientOnly
    type: number
  - name: preventAutomaticValueUpdates
    summary: |
      When true, the scroll view will not automatically clamp its value when the scrollable size changes.
      Useful when external code is managing the scroll offset directly.
    description:
    is_static: false
    code_samples:
    tags:
      - ClientOnly
    type: boolean
